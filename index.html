<style>

  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d2b1a; color: #e8f0ec; min-height: 100vh; }

  header {

    border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap;

  nav button:hover { color: #f0c040; }
  nav button.active { color: #f0c040; border-bottom-color: #f0c040; background: rgba(200,168,75,0.06); }

  .page { display: none; padding: 20px; max-width: 1300px; margin: 0 auto; }
  .page.active { display: block; }

  .section-title { font-size: 0.9rem; font-weight: 700; color: #f0c040; margin-bottom: 14px; letter-spacing: 1px; text-transform: uppercase; }
  .tip { background: #112a18; border-left: 3px solid #f0c040; padding: 9px 13px; border-radius: 0 6px 6px 0; font-size: 0.8rem; color: #7aaa90; margin-bottom: 14px; }

  /* ── LEADERBOARD ── */
  .standings-table { width: 100%; border-collapse: collapse; background: #0f3020; border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
  .standings-table th { background: #1a4a2e; padding: 9px 13px; text-align: left; font-size: 0.77rem; text-transform: uppercase; letter-spacing: 0.5px; color: #7aaa90; }
  .standings-table td { padding: 9px 13px; border-bottom: 1px solid #112a18; font-size: 0.88rem; }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table tr:hover td { background: #0d2218; }
  .rank-badge { width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
  .rank-1 { background: #f0c040; color: #000; }
  .rank-2 { background: #7aaa90; color: #000; }
  .rank-3 { background: #a0654a; color: #fff; }
  .rank-other { background: #1e5535; color: #7aaa90; }

  .leaderboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }
  .player-card { background: #0f3020; border-radius: 10px; overflow: hidden; border: 1px solid #1e5535; }
  .player-card-header { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; }
  .player-name { font-weight: 700; font-size: 0.95rem; }
  .player-points { font-size: 1.5rem; font-weight: 800; color: #f0c040; }
  .player-pts-label { font-size: 0.68rem; color: #6aaa88; text-transform: uppercase; }
  .player-teams-list { padding: 0 14px 10px; }
  .team-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.8rem; border-bottom: 1px solid #112a18; }
  .team-row:last-child { border-bottom: none; }
  .team-pts { font-weight: 600; color: #7ec8a4; font-size: 0.78rem; }
  .team-pts.zero { color: #3a5540; }

  /* ── DRAFT BOARD ── */
  .draft-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .draft-col { background: #0f3020; border-radius: 10px; overflow: hidden; border: 1px solid #1e5535; }
  .draft-col-header { padding: 9px 13px; font-weight: 700; font-size: 0.9rem; text-align: center; }
  .draft-pick { padding: 5px 12px; font-size: 0.82rem; display: flex; gap: 6px; align-items: center; border-top: 1px solid #112a18; }
  .pick-num { color: #3a5540; width: 14px; font-size: 0.72rem; }
  .pick-pts { font-size: 0.72rem; font-weight: 600; color: #7ec8a4; }
  .pick-pts.zero { color: #3a5540; }

  /* ── MATCH ENTRY ── */
  .match-form { background: #0f3020; border-radius: 10px; padding: 18px; border: 1px solid #1e5535; margin-bottom: 18px; }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 0.75rem; color: #7aaa90; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group select, .form-group input { background: #112a18; border: 1px solid #1e5535; color: #e8f0ec; padding: 7px 10px; border-radius: 6px; font-size: 0.88rem; min-width: 130px; }
  .form-group select:focus, .form-group input:focus { outline: none; border-color: #f0c040; }
  .score-inputs { display: flex; align-items: center; gap: 7px; }
  .score-inputs input { width: 55px; text-align: center; }
  .score-sep { color: #3a5540; font-weight: 700; }
  .btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.88rem; font-weight: 600; transition: all 0.15s; }
  .btn-primary { background: #f0c040; color: #000; }
  .btn-primary:hover { background: #dab94f; }
  .btn-danger { background: #3a1515; color: #e07070; border: 1px solid #5a2020; font-size: 0.78rem; padding: 4px 9px; }
  .btn-danger:hover { background: #4a1e1e; }
  .results-list { display: flex; flex-direction: column; gap: 7px; }
  .result-item { background: #0f3020; border: 1px solid #1e5535; border-radius: 8px; padding: 9px 14px; display: flex; justify-content: space-between; align-items: center; }
  .result-score { font-weight: 700; color: #f0c040; margin: 0 10px; }
  .result-stage { font-size: 0.72rem; color: #6aaa88; background: #1a4a2e; padding: 2px 7px; border-radius: 4px; }
  .result-pts { font-size: 0.75rem; color: #7ec8a4; margin-left: 6px; }
  .result-source { font-size: 0.68rem; color: #3a6a4a; background: #0d2418; padding: 1px 5px; border-radius: 3px; margin-left: 5px; }
  .stage-tabs { display: flex; gap: 7px; margin-bottom: 14px; flex-wrap: wrap; }
  .stage-tab { padding: 5px 12px; border-radius: 20px; border: 1px solid #1e5535; background: #0f3020; color: #7aaa90; cursor: pointer; font-size: 0.8rem; transition: all 0.15s; }
  .stage-tab.active { background: #1a4a2e; border-color: #f0c040; color: #f0c040; }
  .empty-state { text-align: center; padding: 28px; color: #3a5540; font-size: 0.88rem; }

  /* ── GROUP TABLES ── */
  .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .group-card { background: #0f3020; border-radius: 10px; overflow: hidden; border: 1px solid #1e5535; }
  .group-card-header { background: #1a4a2e; padding: 8px 14px; font-weight: 700; font-size: 0.88rem; color: #f0c040; letter-spacing: 1px; }
  .group-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  .group-table th { padding: 5px 8px; text-align: right; color: #6aaa88; font-weight: 600; font-size: 0.7rem; }
  .group-table th:first-child { text-align: left; }
  .group-table td { padding: 6px 8px; text-align: right; border-top: 1px solid #112a18; }
  .group-table td:first-child { text-align: left; font-weight: 500; }
  .group-table tr.qualified td { color: #7ec8a4; }
  .group-table tr.qualified td:first-child::after { content: ' ✓'; font-size: 0.65rem; color: #7ec8a4; }
  .group-table tr.maybe-qualified td { color: #f0c040; }
  .group-pts { font-weight: 700; color: #e8f0ec; }
  .team-owner-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

  /* ── BRACKET ── */
  .bracket-container { overflow-x: auto; padding-bottom: 10px; }
  .bracket { display: flex; gap: 0; min-width: 900px; }
  .bracket-round { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
  .round-header { text-align: center; padding: 8px; font-size: 0.72rem; font-weight: 700; color: #7aaa90; text-transform: uppercase; letter-spacing: 0.5px; background: #0f3020; border-bottom: 1px solid #1e5535; margin-bottom: 4px; }
  .bracket-slots { display: flex; flex-direction: column; justify-content: space-around; flex: 1; padding: 4px 3px; gap: 4px; }
  .bracket-match { background: #0f3020; border: 1px solid #1e5535; border-radius: 6px; overflow: hidden; }
  .bracket-team { padding: 5px 8px; font-size: 0.75rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #112a18; }
  .bracket-team:last-child { border-bottom: none; }
  .bracket-team.winner { background: rgba(126,200,164,0.1); color: #7ec8a4; font-weight: 600; }
  .bracket-team.tbd { color: #2a4535; font-style: italic; }
  .bracket-team-pts { font-size: 0.68rem; color: #f0c040; }
  .bracket-separator { display: flex; align-items: center; justify-content: center; padding: 2px 0; }

  /* ── MANAGE ── */
  .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }
  .player-edit-card { background: #0f3020; border-radius: 10px; padding: 14px; border: 1px solid #1e5535; }
  .player-edit-header { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .player-edit-header input[type=text] { flex: 1; background: #112a18; border: 1px solid #1e5535; color: #e8f0ec; padding: 6px 9px; border-radius: 6px; font-weight: 700; }
  .color-swatch { width: 30px; height: 30px; border-radius: 6px; border: 2px solid #1e5535; cursor: pointer; padding: 0; }
  .teams-edit-list { display: flex; flex-direction: column; gap: 4px; }
  .team-edit-row { display: flex; gap: 5px; }
  .team-edit-row input { flex: 1; background: #112a18; border: 1px solid #1e5535; color: #e8f0ec; padding: 4px 7px; border-radius: 5px; font-size: 0.82rem; }
  .add-player-btn { background: #1a4a2e; border: 1px dashed #2a6040; color: #7aaa90; border-radius: 10px; padding: 14px; cursor: pointer; text-align: center; font-size: 0.88rem; transition: all 0.15s; }
  .add-player-btn:hover { background: #1e5535; color: #f0c040; }

  /* ── DRAFT TAB ── */

  .draft-player-col {
    min-width: 140px; flex: 1; background: #0f3020; border-radius: 10px;

  }
  .draft-player-col.drag-over { border-color: #f0c040; background: #112a18; }
  .draft-player-header {
    padding: 8px 10px; display: flex; align-items: center; gap: 6px;
    border-bottom: 2px solid #1e5535; position: relative;
  }
  .draft-player-header input[type=text] {
    background: none; border: none; color: inherit; font-weight: 700; font-size: 0.88rem;
    width: 100%; outline: none; cursor: text;
  }
  .draft-player-header input[type=text]:focus { border-bottom: 1px solid #f0c040; }
  .draft-player-body { padding: 6px; min-height: 60px; display: flex; flex-direction: column; gap: 4px; }
  .draft-team-chip {
    display: flex; justify-content: space-between; align-items: center;
    background: #112a18; border: 1px solid #1e5535; border-radius: 5px;
    padding: 4px 7px; font-size: 0.78rem; cursor: grab; user-select: none;
    transition: background 0.12s, opacity 0.12s;
  }
  .draft-team-chip:hover { background: #1a4535; border-color: #2a6040; }
  .draft-team-chip.dragging { opacity: 0.35; }
  .draft-team-chip .chip-remove {
    color: #3a5540; font-size: 0.7rem; cursor: pointer; padding: 0 2px; margin-left: 4px;
    transition: color 0.1s;
  }
  .draft-team-chip .chip-remove:hover { color: #e07070; }
  .draft-drop-hint {
    text-align: center; color: #2a5a3a; font-size: 0.72rem; padding: 8px 4px;
    border: 1px dashed #1e5535; border-radius: 5px; margin: 2px 0;
  }
  .pool-section { margin-top: 20px; }
  .pool-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .pool-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
    background: #0f3020; border-radius: 10px; border: 2px solid #1e5535;
    padding: 12px; min-height: 60px; transition: border-color 0.15s;

  .pool-grid.drag-over { border-color: #6aaa88; background: #0d2b15; }
  .pool-chip {
    display: flex; align-items: center; gap: 5px;
    background: #112a18; border: 1px solid #1e5535; border-radius: 5px;
    padding: 5px 9px; font-size: 0.8rem; cursor: grab; user-select: none;
    transition: background 0.12s, opacity 0.12s;

  .pool-chip:hover { background: #1a4535; border-color: #2a6040; }
  .pool-chip.dragging { opacity: 0.35; }
  .pool-odds { font-size: 0.68rem; color: #6aaa88; }
  .draft-player-settings { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .player-setting-pill {
    display: flex; align-items: center; gap: 6px; background: #0f3020;
    border: 1px solid #1e5535; border-radius: 20px; padding: 5px 10px;
  }
  .player-setting-pill input[type=text] {
    background: none; border: none; color: #e8f0ec; font-size: 0.82rem; width: 80px; outline: none;

  .player-count-badge { font-size: 0.7rem; color: #6aaa88; margin-left: auto; padding-right: 2px; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: #1a5c3a; color: #7ec8a4; padding: 9px 16px; border-radius: 8px; font-size: 0.88rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
  .toast.show { opacity: 1; }
  .auto-badge { font-size: 0.68rem; background: #0d2418; color: #3a8a5a; border: 1px solid #1a4a2a; padding: 1px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; }

  /* ── OVERLAY / MODAL ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(5,12,25,0.93);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 2000; backdrop-filter: blur(4px);
    overflow-y: auto; padding: 40px 16px 60px;
  }
  .overlay.landing { background: rgba(5,20,10,0.72); backdrop-filter: blur(2px); }
  .overlay.hidden { display: none; }
  .landing-stack { display: flex; flex-direction: column; gap: 20px; width: 92%; max-width: 440px; }
  .landing-stack .modal { width: 100%; max-width: 100%; }
  .modal {
    background: #0f3020; border: 1px solid #2a6040; border-radius: 14px;
    padding: 30px 28px; max-width: 440px; width: 92%;
    box-shadow: 0 24px 70px rgba(0,0,0,0.6);
  }
  .modal h2 { color: #f0c040; font-size: 1.25rem; margin-bottom: 8px; }
  .modal p { color: #7aaa90; font-size: 0.84rem; margin-bottom: 20px; line-height: 1.55; }
  .modal-input {
    width: 100%; background: #112a18; border: 1px solid #1e5535; color: #e8f0ec;
    padding: 10px 13px; border-radius: 8px; font-size: 0.95rem; margin-bottom: 11px; outline: none;
  }
  .modal-input:focus { border-color: #f0c040; }
  .modal-error { color: #e07070; font-size: 0.82rem; margin-bottom: 10px; display: none; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-footer .btn { flex: 1; }
  .share-link-box {
    font-family: monospace; background: #0d2b1a; border: 1px solid #2a6040;
    padding: 10px 13px; border-radius: 8px; font-size: 0.8rem; color: #7ec8a4;
    margin-bottom: 16px; word-break: break-all; line-height: 1.4;
  }
</style>

let sessionEditMode = false;  // true after correct PIN entered
let saveDebounceTimer = null;

function canEdit()       { return sessionEditMode && !state.locked; }
function isDraftLocked() { return !canEdit(); }  // backwards compat

// ═══════════════════════════════════════════════════════════════
// SUPABASE HELPERS
// ═══════════════════════════════════════════════════════════════
async function sbFetch(path, options = {}) {
  return fetch(`${SUPABASE_URL}/rest/v1${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
      ...(options.headers || {}),
    }
  });
}

async function fetchLeague(id) {
  try {
    const res = await sbFetch(`/leagues?id=eq.${encodeURIComponent(id)}&select=*`);
    if (!res.ok) return null;
    const data = await res.json();
    return data[0] || null;
  } catch(e) { return null; }
}

async function persistLeague(id, name, pinHash, data) {
  return sbFetch('/leagues', {
    method: 'POST',
    body: JSON.stringify({ id, name, pin_hash: pinHash, data })
  });
}

// ═══════════════════════════════════════════════════════════════
// PIN & ID UTILS
// ═══════════════════════════════════════════════════════════════
async function hashPin(pin) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function genLeagueId() {
  const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
  return Array.from(crypto.getRandomValues(new Uint8Array(8)))
    .map(b => chars[b % chars.length]).join('');
}

// ═══════════════════════════════════════════════════════════════
// DATA PERSISTENCE
// ═══════════════════════════════════════════════════════════════
function saveData() {
  if (!SUPABASE_CONFIGURED) {
    // Local mode — use localStorage
    localStorage.setItem('wc26_players', JSON.stringify(state.players));
    localStorage.setItem('wc26_manual_matches', JSON.stringify(state.manualMatches));
    localStorage.setItem('wc26_locked', String(state.locked));
    return;
  }
  // Supabase mode — debounced PATCH
  clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(async () => {
    if (!state.leagueId) return;
    await sbFetch(`/leagues?id=eq.${state.leagueId}`, {
      method: 'PATCH',
      body: JSON.stringify({
        data: { players: state.players, manualMatches: state.manualMatches, locked: state.locked }
      })
    });
  }, 800);
}

async function submitCreateLeague() {
  const name  = document.getElementById('cl-name').value.trim();
  const pin   = document.getElementById('cl-pin').value;
  const pin2  = document.getElementById('cl-pin2').value;
  const errEl = document.getElementById('cl-error');
  errEl.style.display = 'none';

  if (!name)         { errEl.textContent = 'Please enter a league name.';      errEl.style.display='block'; return; }
  if (pin.length < 4){ errEl.textContent = 'PIN must be at least 4 characters.'; errEl.style.display='block'; return; }
  if (pin !== pin2)  { errEl.textContent = "PINs don't match.";                errEl.style.display='block'; return; }

  showLoadingOverlay('Creating your league…');

  const id = genLeagueId();
  const pinHash = await hashPin(pin);
  const initialData = { players: DEFAULT_PLAYERS, manualMatches: [], locked: false };

  let res, errorDetail = '';
  try {
    res = await persistLeague(id, name, pinHash, initialData);
    if (!res.ok) {
      try { const body = await res.json(); errorDetail = body.message || body.hint || JSON.stringify(body); }
      catch(e) { errorDetail = `HTTP ${res.status}`; }
    }
  } catch(e) {
    res = { ok: false };
    errorDetail = e.message || 'Network error — check your internet connection.';
  }

  if (!res.ok) {
    showErrorOverlay('⚠️ Could Not Create League',
      `<strong>Error:</strong> ${errorDetail || 'Unknown error'}<br><br>
       Most likely fix: open <strong>Supabase → SQL Editor</strong> and run the CREATE TABLE script from the setup guide. Then try again.`, false);
    return;
  }

  // Load the new league into state
  state.leagueId = id;
  state.leagueName = name;
  state.pinHash = pinHash;
  state.players = JSON.parse(JSON.stringify(DEFAULT_PLAYERS));
  state.manualMatches = [];
  state.locked = false;
  sessionEditMode = true;  // creator gets full edit access immediately

  window.location.hash = id;
  hideBgVideo();
  hideOverlay();
  updateHeaderUI();
  renderAll();
  showPage('manage');
  showToast('🎉 League created! Share the URL with your friends.');
}

async function init() {
  if (window.WC_LAST_UPDATED) {
    document.getElementById('last-updated-label').textContent = '🔄 ' + window.WC_LAST_UPDATED;
  }

  if (!SUPABASE_CONFIGURED) {
    // ── LOCAL MODE (no Supabase) ─────────────────────────────────
    try {
      const p = localStorage.getItem('wc26_players');
      const m = localStorage.getItem('wc26_manual_matches');
      state.players = p ? JSON.parse(p) : DEFAULT_PLAYERS;
      state.manualMatches = m ? JSON.parse(m) : [];
      state.locked = localStorage.getItem('wc26_locked') === 'true';
    } catch(e) {
      state.players = DEFAULT_PLAYERS; state.manualMatches = [];
    }
    sessionEditMode = true;  // full access in local mode
    renderAll();
    return;
  }

  // ── SUPABASE MODE ───────────────────────────────────────────────
  const id = window.location.hash.slice(1);

  if (!id) {
    showBgVideo();
    showCreateLeagueOverlay(true);
    return;
  }

  showLoadingOverlay('Loading your league…');
  const league = await fetchLeague(id);

  if (!league) {
    showErrorOverlay(
      '🏟️ League Not Found',
      `No league was found for the link you used. The ID may be wrong, or the league may not exist yet.`,
      true
    );
    return;
  }

  state.leagueId  = id;
  state.leagueName = league.name;
  state.pinHash   = league.pin_hash;
  const d = league.data || {};
  state.players      = d.players?.length ? d.players : JSON.parse(JSON.stringify(DEFAULT_PLAYERS));
  state.manualMatches = d.manualMatches || [];
  state.locked        = d.locked || false;
  sessionEditMode = false;  // start in view-only mode

  hideBgVideo();
  hideOverlay();
  updateHeaderUI();
  renderAll();
}

// ═══════════════════════════════════════════════════════════════
// POINTS CALCULATION
// ═══════════════════════════════════════════════════════════════
function normalize(t) { return (t||'').trim().toLowerCase(); }
function allMatches()  { return [...(window.WC_MATCH_DATA||[]), ...state.manualMatches]; }

function getTeamPoints(teamName) {
  let pts = 0;
  const n = normalize(teamName);
  for (const m of allMatches()) {
    const a = normalize(m.teamA), b = normalize(m.teamB);
    const isA = a === n, isB = b === n;
    if (!isA && !isB) continue;
    if (m.stage === 'group') {
      if (m.scoreA === m.scoreB) pts += 1;
      else if ((isA && m.scoreA > m.scoreB)||(isB && m.scoreB > m.scoreA)) pts += 3;
    } else {
      const wp = STAGE_POINTS[m.stage]?.win || 0;
      if ((isA && m.scoreA > m.scoreB)||(isB && m.scoreB > m.scoreA)) pts += wp;
    }
  }
  return pts;
}

function getPlayerPoints(player) {
  return player.teams.filter(t=>t).reduce((s,t) => s + getTeamPoints(t), 0);
}

function getTeamOwner(teamName) {
  const n = normalize(teamName);
  for (const p of state.players)
    if (p.teams.some(t => normalize(t) === n)) return p;
  return null;
}

// ═══════════════════════════════════════════════════════════════
// GROUP TABLE STATS
// ═══════════════════════════════════════════════════════════════
function computeGroupStandings(groupTeams) {
  const stats = {};
  groupTeams.forEach(t => { stats[normalize(t)] = { name:t, mp:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 }; });
  const gms = allMatches().filter(m => m.stage === 'group');
  for (const m of gms) {
    const a = normalize(m.teamA), b = normalize(m.teamB);
    if (!stats[a] || !stats[b]) continue;
    stats[a].mp++; stats[b].mp++;
    stats[a].gf += m.scoreA; stats[a].ga += m.scoreB;
    stats[b].gf += m.scoreB; stats[b].ga += m.scoreA;
    if (m.scoreA > m.scoreB)      { stats[a].w++; stats[a].pts+=3; stats[b].l++; }
    else if (m.scoreA < m.scoreB) { stats[b].w++; stats[b].pts+=3; stats[a].l++; }
    else { stats[a].d++; stats[b].d++; stats[a].pts++; stats[b].pts++; }
  }
  return Object.values(stats).sort((a,b) =>
    b.pts - a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf - a.gf
  );
}

function renderBracket() {
  function getKnockoutWinner(m) {
    if (m.scoreA > m.scoreB) return normalize(m.teamA);
    if (m.scoreB > m.scoreA) return normalize(m.teamB);
    return null;
  }
  const kMatches = allMatches().filter(m => m.stage !== 'group');
  const rounds = ['r32','r16','qf','sf','final'];
  const roundNames = { r32:'Round of 32', r16:'Round of 16', qf:'Quarterfinals', sf:'Semifinals', final:'Final' };
  const expectedMatches = { r32:16, r16:8, qf:4, sf:2, final:1 };

  function teamOwnerColor(name) {
    const o = getTeamOwner(name);
    return o ? o.color : null;
  }
  function matchWinPts(m, side) {
    const aWon = m.scoreA > m.scoreB, bWon = m.scoreB > m.scoreA;
    if (side === 'A' && aWon) return STAGE_POINTS[m.stage]?.win || 0;
    if (side === 'B' && bWon) return STAGE_POINTS[m.stage]?.win || 0;
    return 0;
  }

  let html = `<div class="bracket-container"><div class="bracket">`;
  rounds.forEach(round => {
    const ms = kMatches.filter(m => m.stage === round);
    const total = expectedMatches[round];
    html += `<div class="bracket-round">
      <div class="round-header">${roundNames[round]}</div>
      <div class="bracket-slots">`;
    for (let i = 0; i < total; i++) {
      const m = ms[i];
      if (m) {
        const aWon = m.scoreA > m.scoreB, bWon = m.scoreB > m.scoreA;
        const aColor = teamOwnerColor(m.teamA), bColor = teamOwnerColor(m.teamB);
        const ptsA = matchWinPts(m, 'A'), ptsB = matchWinPts(m, 'B');
        html += `<div class="bracket-match">
          <div class="bracket-team ${aWon?'winner':''}">
            <span>${aColor?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${aColor};margin-right:3px"></span>`:''}${m.teamA}</span>
            <span>${m.scoreA}${ptsA>0?` <span class="bracket-team-pts">+${ptsA}</span>`:''}</span>
          </div>
          <div class="bracket-team ${bWon?'winner':''}">
            <span>${bColor?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${bColor};margin-right:3px"></span>`:''}${m.teamB}</span>
            <span>${m.scoreB}${ptsB>0?` <span class="bracket-team-pts">+${ptsB}</span>`:''}</span>
          </div>
        </div>`;
      } else {
        html += `<div class="bracket-match">
          <div class="bracket-team tbd">TBD</div>
          <div class="bracket-team tbd">TBD</div>
        </div>`;
      }
    }
    html += `</div></div>`;
  });
  html += `</div></div>
    <div style="margin-top:10px;font-size:0.75rem;color:#6aaa88">
      Bracket fills automatically as results are entered. Colored dots = drafted player.
    </div>`;
  return html;
}

// ═══════════════════════════════════════════════════════════════
// RENDER — MATCH ENTRY
// ═══════════════════════════════════════════════════════════════
let matchStageFilter = 'all';

function renderMatches() {
  const allTeamsList = [...new Set(
    Object.values(WC_GROUPS).flat().concat(
      state.players.flatMap(p=>p.teams.filter(t=>t))
    )
  )].sort();
  const teamOpts = allTeamsList.map(t=>`<option value="${t}">${t}</option>`).join('');
  const stageOpts = Object.entries(STAGE_LABELS).map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
  const combined = allMatches();
  const filtered = matchStageFilter==='all' ? combined : combined.filter(m=>m.stage===matchStageFilter);
  const autoCount = (window.WC_MATCH_DATA||[]).length;

  let html = `
    <h2 class="section-title">Enter Match Results</h2>
    <div class="tip">
      Manual entries below. Auto-fetched results are marked <span class="auto-badge">auto</span> and updated daily at 6am.
      ${autoCount > 0 ? `<strong style="color:#7ec8a4">${autoCount} results auto-loaded.</strong>` : 'No auto-results yet — Claude will fetch after June 11.'}
    </div>
    <div class="match-form">
      <div class="form-row">
        <div class="form-group"><label>Stage</label><select id="inp-stage">${stageOpts}</select></div>
        <div class="form-group"><label>Team A</label><select id="inp-teamA"><option value="">— select —</option>${teamOpts}</select></div>
        <div class="form-group"><label>Score</label>
          <div class="score-inputs">
            <input type="number" id="inp-scoreA" min="0" max="20" value="0"/>
            <span class="score-sep">–</span>
            <input type="number" id="inp-scoreB" min="0" max="20" value="0"/>
          </div>
        </div>
        <div class="form-group"><label>Team B</label><select id="inp-teamB"><option value="">— select —</option>${teamOpts}</select></div>
        <div class="form-group" style="justify-content:flex-end">
          <button class="btn btn-primary" onclick="addMatch()">Add Result</button>
        </div>
      </div>
    </div>
    <h2 class="section-title">Results Log</h2>
    <div class="stage-tabs">
      <div class="stage-tab ${matchStageFilter==='all'?'active':''}" onclick="filterMatches('all')">All (${combined.length})</div>
      ${Object.entries(STAGE_LABELS).map(([v,l])=>{
        const c = combined.filter(m=>m.stage===v).length;
        return `<div class="stage-tab ${matchStageFilter===v?'active':''}" onclick="filterMatches('${v}')">${l} ${c>0?`(${c})`:''}</div>`;
      }).join('')}
    </div>
    <div class="results-list">`;

  if (filtered.length === 0) html += `<div class="empty-state">No results yet for this stage.</div>`;

  const wcData = window.WC_MATCH_DATA || [];
  const autoFiltered   = filtered.filter(m => wcData.includes(m));
  const manualFiltered = filtered.filter(m => !wcData.includes(m));

  [...autoFiltered, ...manualFiltered].forEach(m => {
    const isAuto = wcData.includes(m);
    const manualIdx = isAuto ? -1 : state.manualMatches.indexOf(m);
    const ptsA = resultPts(m,'A'), ptsB = resultPts(m,'B');
    const ownerA = getTeamOwner(m.teamA), ownerB = getTeamOwner(m.teamB);
    html += `<div class="result-item">
      <div style="font-size:0.88rem">
        <strong>${m.teamA}</strong>${ownerA?` <span style="color:${ownerA.color};font-size:0.72rem">(${ownerA.name})</span>`:''}
        ${ptsA>0?`<span class="result-pts">+${ptsA}pts</span>`:''}
        <span class="result-score">${m.scoreA}–${m.scoreB}</span>
        <strong>${m.teamB}</strong>${ownerB?` <span style="color:${ownerB.color};font-size:0.72rem">(${ownerB.name})</span>`:''}
        ${ptsB>0?`<span class="result-pts">+${ptsB}pts</span>`:''}
        ${isAuto?`<span class="auto-badge">auto</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:7px">
        <span class="result-stage">${STAGE_LABELS[m.stage]}</span>
        ${!isAuto && manualIdx>=0 ? `<button class="btn btn-danger" onclick="removeManualMatch(${manualIdx})">✕</button>` : ''}
      </div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('page-matches').innerHTML = html;
}

function resultPts(m, side) {
  if (m.stage === 'group') {
    if (m.scoreA === m.scoreB) return 1;
    if (side==='A' && m.scoreA>m.scoreB) return 3;
    if (side==='B' && m.scoreB>m.scoreA) return 3;
    return 0;
  }
  const wp = STAGE_POINTS[m.stage]?.win || 0;
  if (side==='A' && m.scoreA>m.scoreB) return wp;
  if (side==='B' && m.scoreB>m.scoreA) return wp;
  return 0;
}

function addMatch() {
  const stage  = document.getElementById('inp-stage').value;
  const teamA  = document.getElementById('inp-teamA').value;
  const teamB  = document.getElementById('inp-teamB').value;
  const scoreA = parseInt(document.getElementById('inp-scoreA').value)||0;
  const scoreB = parseInt(document.getElementById('inp-scoreB').value)||0;
  if (!teamA||!teamB) return showToast('Select both teams');
  if (teamA===teamB) return showToast('Teams must be different');
  if (stage!=='group' && scoreA===scoreB) return showToast('Knockout matches must have a winner');
  state.manualMatches.push({ stage, teamA, teamB, scoreA, scoreB });
  saveData(); renderAll(); showToast('Result added!');
}
function removeManualMatch(idx) { state.manualMatches.splice(idx,1); saveData(); renderAll(); }
function filterMatches(s) { matchStageFilter=s; renderMatches(); }

function oddsLabel(team) {
  const o = WC_ODDS[team];
  if (!o) return '';
  return o >= 1000 ? `+${(o/1000).toFixed(o%1000===0?0:1)}k` : `+${o}`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER — DRAFT TAB (drag-and-drop)
// ═══════════════════════════════════════════════════════════════
let dragState = null;

function toggleDraftLock() {
  if (!sessionEditMode) return;
  state.locked = !state.locked;
  saveData();
  renderManage();
  updateHeaderUI();
  showToast(state.locked ? '🔒 Draft locked' : '🔓 Draft unlocked');
}

function renderManage() {
  // isDraftLocked() = !canEdit() = !sessionEditMode || state.locked
  // "locked" in this context means "editing is disabled for any reason"
  const locked = isDraftLocked();

  // ── Lock / Edit button ──────────────────────────────────────
  let lockBtn;
  if (!sessionEditMode) {
    lockBtn = `<button class="btn" onclick="showPinModal()"
      style="background:#1a4a2e;border:1px solid #4a8aaa;color:#7aaa90;display:flex;align-items:center;gap:6px">
      ✏️ Enter Edit Mode
    </button>`;
  } else if (state.locked) {
    lockBtn = `<button class="btn" onclick="toggleDraftLock()"
      style="background:#1a4a2e;border:1px solid #f0c040;color:#f0c040;display:flex;align-items:center;gap:6px">
      🔓 Unlock Draft
    </button>`;
  } else {
    lockBtn = `<button class="btn" onclick="toggleDraftLock()"
      style="background:#1a4a2e;border:1px solid #6aaa88;color:#7aaa90;display:flex;align-items:center;gap:6px">
      🔒 Lock Draft
    </button>`;
  }

  // ── Tip text ────────────────────────────────────────────────
  let tipHtml, tipStyle = '';
  if (!sessionEditMode) {
    tipHtml = '👁 <strong>View-only mode.</strong> Click "Enter Edit Mode" and enter the PIN to make changes.';
  } else if (state.locked) {
    tipHtml = '🔒 <strong style="color:#f0c040">Draft is locked.</strong> Teams are set — click Unlock Draft to make changes.';
    tipStyle = 'border-color:#f0c040;background:#1a2a18';
  } else {
    tipHtml = 'Drag countries onto a player\'s column to assign them. Drag back to the pool to unassign. Lock when your draft is final.';
  }

  // ── Settings pills ──────────────────────────────────────────
  const settingsHtml = state.players.map((p,pi) => `
    <div class="player-setting-pill" style="${locked?'opacity:0.6;pointer-events:none':''}">
      <input type="color" value="${p.color}" ${locked?'disabled':''} onchange="updatePlayerColor(${pi},this.value)" title="Color"/>
      <input type="text" value="${p.name}" ${locked?'readonly':''} onchange="updatePlayerName(${pi},this.value)" title="Name"
        style="${locked?'cursor:default':''}"/>
      <span class="player-count-badge">${p.teams.filter(t=>t).length}🌍</span>
      ${locked?'':`<button class="btn btn-danger" style="padding:2px 7px;font-size:0.7rem" onclick="removePlayer(${pi})" title="Remove">✕</button>`}
    </div>`).join('');

  // ── Unselected pool ─────────────────────────────────────────
  const allTeams = Object.values(WC_GROUPS).flat();
  const drafted = new Set(state.players.flatMap(p => p.teams.map(t => normalize(t))).filter(Boolean));
  const unselected = allTeams
    .filter(t => !drafted.has(normalize(t)))
    .sort((a,b) => (WC_ODDS[a]||999999) - (WC_ODDS[b]||999999));

  // ── Player columns ──────────────────────────────────────────
  const colsHtml = state.players.map((p,pi) => {
    const picks = p.teams.filter(t=>t);
    const chipsHtml = picks.map(t => `
      <div class="draft-team-chip" ${locked?'':'draggable="true"'}
        ${locked?'':`ondragstart="onChipDragStart(event,'${t.replace(/'/g,"\\'")}',${pi})" ondragend="onDragEnd(event)"`}
        style="${locked?'cursor:default':''}">
        <span>${t}</span>
        ${locked?'':`<span class="chip-remove" onclick="removeTeamFromPlayer(${pi},'${t.replace(/'/g,"\\'")}')">✕</span>`}
      </div>`).join('');
    return `
      <div class="draft-player-col" id="player-col-${pi}"
        ${locked?'':`ondragover="onColDragOver(event,${pi})" ondragleave="onColDragLeave(event,${pi})" ondrop="onColDrop(event,${pi})"`}>
        <div class="draft-player-header" style="background:${p.color}22; border-color:${p.color}55">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${p.color};flex-shrink:0"></span>
          <span style="font-weight:700;font-size:0.88rem;color:${p.color}">${p.name}</span>
          <span class="player-count-badge">${picks.length}</span>
        </div>
        <div class="draft-player-body">
          ${chipsHtml}
          ${locked?'':`<div class="draft-drop-hint">drop here</div>`}
        </div>
      </div>`;
  }).join('');

  // ── Pool ────────────────────────────────────────────────────
  const emptyMsg = `<span style="color:#3a5540;font-size:0.82rem">All teams drafted!</span>`;
  const poolHtml = unselected.length === 0 ? emptyMsg :
    unselected.map(t => locked
      ? `<div class="pool-chip" style="cursor:default;opacity:0.5"><span>${t}</span><span class="pool-odds">${oddsLabel(t)}</span></div>`
      : `<div class="pool-chip" draggable="true"
           ondragstart="onPoolDragStart(event,'${t.replace(/'/g,"\\'")}' )"
           ondragend="onDragEnd(event)">
           <span>${t}</span><span class="pool-odds">${oddsLabel(t)}</span>
         </div>`
    ).join('');

  document.getElementById('page-manage').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px">
      <h2 class="section-title" style="margin:0">Draft</h2>
      ${lockBtn}
    </div>
    <div class="tip" style="${tipStyle}">${tipHtml}</div>
    <div class="draft-player-settings">${settingsHtml}
      ${locked?'':`<div class="add-player-btn" style="padding:5px 14px;border-radius:20px;font-size:0.82rem" onclick="addPlayer()">+ Add Player</div>`}
    </div>
    <div class="draft-board-wrap">${colsHtml}</div>
    <div class="pool-section">
      <div class="pool-header">
        <h2 class="section-title" style="margin:0">Unselected (${unselected.length})</h2>
        <span style="font-size:0.75rem;color:#6aaa88">sorted by win odds</span>
      </div>
      <div class="pool-grid" id="pool-grid"
        ${locked?'':`ondragover="onPoolDragOver(event)" ondragleave="onPoolDragLeave(event)" ondrop="onPoolDrop(event)"`}>
        ${poolHtml}
      </div>
    </div>`;
}

// ── DRAG & DROP ──────────────────────────────────────────────
function onChipDragStart(e, team, fromPlayer) {
  if (isDraftLocked()) { e.preventDefault(); return; }
  dragState = { team, fromPlayer };
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function onPoolDragStart(e, team) {
  if (isDraftLocked()) { e.preventDefault(); return; }
  dragState = { team, fromPlayer: -1 };
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function onDragEnd(e) { e.target.classList.remove('dragging'); }

function onColDragOver(e, pi) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  document.getElementById(`player-col-${pi}`)?.classList.add('drag-over');
}
function onColDragLeave(e, pi) {
  document.getElementById(`player-col-${pi}`)?.classList.remove('drag-over');
}
function onColDrop(e, pi) {
  e.preventDefault();
  document.getElementById(`player-col-${pi}`)?.classList.remove('drag-over');
  if (!dragState) return;
  const { team, fromPlayer } = dragState; dragState = null;
  if (fromPlayer >= 0)
    state.players[fromPlayer].teams = state.players[fromPlayer].teams.filter(t => normalize(t) !== normalize(team));
  if (!state.players[pi].teams.some(t => normalize(t) === normalize(team)))
    state.players[pi].teams.push(team);
  saveData(); renderAll();
}
function onPoolDragOver(e) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  document.getElementById('pool-grid')?.classList.add('drag-over');
}
function onPoolDragLeave(e) {
  document.getElementById('pool-grid')?.classList.remove('drag-over');
}
function onPoolDrop(e) {
  e.preventDefault();
  document.getElementById('pool-grid')?.classList.remove('drag-over');
  if (!dragState) return;
  const { team, fromPlayer } = dragState; dragState = null;
  if (fromPlayer >= 0) {
    state.players[fromPlayer].teams = state.players[fromPlayer].teams.filter(t => normalize(t) !== normalize(team));
    saveData(); renderAll();
  }
}
function removeTeamFromPlayer(pi, team) {
  state.players[pi].teams = state.players[pi].teams.filter(t => normalize(t) !== normalize(team));
  saveData(); renderAll();
}

function updatePlayerName(pi,v)  { if(!canEdit()) return; state.players[pi].name=v; saveData(); renderAll(); }
function updatePlayerColor(pi,v) { if(!canEdit()) return; state.players[pi].color=v; saveData(); renderAll(); }
function removePlayer(pi) {
  if(!canEdit()) return;
  if(!confirm(`Remove ${state.players[pi].name}?`)) return;
  state.players.splice(pi,1); saveData(); renderAll();
}
function addPlayer() {
  if(!canEdit()) return;
  state.players.push({id:Date.now(),name:'New Player',color:'#888888',teams:[]});
  saveData(); renderAll();
}

// ═══════════════════════════════════════════════════════════════
// NAV & UTILS
// ═══════════════════════════════════════════════════════════════
const PAGES = ['leaderboard','draftboard','tournament','manage'];

function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('nav button')[PAGES.indexOf(name)].classList.add('active');
  if(name==='leaderboard') renderLeaderboard();
  if(name==='draftboard')  renderDraftBoard();
  if(name==='tournament')  renderTournament();
  if(name==='matches')     renderMatches();
  if(name==='manage')      renderManage();
}

function renderAll() {
  renderLeaderboard(); renderDraftBoard(); renderTournament(); renderMatches(); renderManage();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── START ──────────────────────────────────────────────────────
init();
</script>
</body>
</html>
